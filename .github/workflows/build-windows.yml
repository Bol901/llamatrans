name: Build Windows EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Download llama.cpp engine (Vulkan)
        run: python setup_local.py

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --windowed --name Translator
          --icon icon.ico
          --add-data "icon.ico;."
          --add-data "icon.png;."
          --add-data "llama_config.json;."
          main.py

      - name: Bundle llama engine next to the exe
        run: Copy-Item -Recurse -Force llama dist/Translator/llama
        shell: pwsh

      - name: Zip release
        run: Compress-Archive -Path dist/Translator/* -DestinationPath Translator-windows-x64.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Translator-windows-x64
          path: Translator-windows-x64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Translator-windows-x64.zip
