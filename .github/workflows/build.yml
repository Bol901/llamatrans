name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build single-file exe
        run: >
          pyinstaller --noconfirm --onefile --windowed --name Translator
          --icon icon.ico
          --add-data "icon.ico;."
          --add-data "icon.png;."
          --add-data "llama_config.json;."
          main.py

      - name: Rename
        shell: pwsh
        run: Move-Item dist/Translator.exe Translator-windows-x64.exe

      # the llama.cpp engine is NOT bundled: the app auto-downloads it
      # (and the models) to a user-data dir on first local-mode use.

      - uses: actions/upload-artifact@v4
        with:
          name: Translator-windows-x64
          path: Translator-windows-x64.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Translator-windows-x64.exe

  macos:
    runs-on: macos-latest   # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # llama.cpp ships no prebuilt macOS server binary, so build it (Metal).
      # Only the server target, in parallel, with @loader_path rpath so the
      # bundled dylibs are found next to the binary on the user's machine.
      - name: Build llama.cpp (Metal) from source
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp
          cmake -S llama.cpp -B llama.cpp/bld -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON \
            -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH='@loader_path'
          cmake --build llama.cpp/bld --config Release \
            --target llama-server --parallel $(sysctl -n hw.ncpu)
          mkdir -p llama
          find llama.cpp/bld -name 'llama-server' -type f -exec cp {} llama/ \;
          find llama.cpp/bld -name '*.dylib' -exec cp {} llama/ \;
          chmod -R +x llama/
          echo "--- bundled engine files ---"; ls -la llama/
          ./llama/llama-server --version || true

      - name: Generate .icns icon
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build .app with PyInstaller
        run: >
          pyinstaller --noconfirm --windowed --name Translator
          --icon icon.icns
          --add-data "icon.ico:."
          --add-data "icon.png:."
          --add-data "llama_config.json:."
          main.py

      - name: Bundle llama engine inside the .app
        run: |
          cp -R llama "dist/Translator.app/Contents/MacOS/llama"
          chmod -R +x "dist/Translator.app/Contents/MacOS/llama"

      - name: Zip .app
        run: ditto -c -k --keepParent dist/Translator.app Translator-macos-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Translator-macos-arm64
          path: Translator-macos-arm64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Translator-macos-arm64.zip
